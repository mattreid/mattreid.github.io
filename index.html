<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Collection</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍜</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="site-title">My Recipe Collection</h1>
            <p class="site-subtitle">Delicious recipes worth repeating</p>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="Search recipes..." class="search-input">
            </div>
            
            <div id="recipeGrid" class="recipe-grid">
                <!-- Recipes will be loaded here -->
            </div>
        </div>
    </main>

    
    <script src="app.js"></script>
</body>
</html>
